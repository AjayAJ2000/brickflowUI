<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="256" height="256">
  <defs>
    <!-- BrickflowUI base palette: deep slate + teal + muted red-orange -->
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="35%" stop-color="#1E293B"/>
      <stop offset="70%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <!-- Teal accent for UI layer -->
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2F7F8F"/>
      <stop offset="100%" stop-color="#5EC4CC"/>
    </linearGradient>

    <!-- Subtle red-orange flow accent -->
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E4572E"/>
      <stop offset="100%" stop-color="#F97066"/>
    </linearGradient>

    <!-- Soft ambient glow -->
    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Node shadow -->
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1F2937" flood-opacity="0.4"/>
    </filter>

    <!-- Radial glow for central node -->
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2F7F8F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2F7F8F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background halo -->
  <circle cx="256" cy="256" r="240" fill="url(#base)" opacity="0.08" filter="url(#ambientGlow)"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#teal)" stroke-width="1" opacity="0.1"/>

  <g transform="translate(256, 256)">

    <!-- OUTER RING OF NODES -->
    <!-- 6 hex nodes at 60° intervals, radius 120 -->

    <!-- Top node -->
    <g transform="translate(0, -120)">
      <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" 
               fill="url(#base)" filter="url(#nodeShadow)"/>
      <polygon points="0,-24 20,-12 20,12 0,24 -20,12 -20,-12" 
               fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="8" fill="#2F7F8F" opacity="0.3"/>
    </g>

    <!-- Top-right node -->
    <g transform="translate(104, -60)">
      <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" 
               fill="url(#teal)" filter="url(#nodeShadow)"/>
      <polygon points="0,-24 20,-12 20,12 0,24 -20,12 -20,-12" 
               fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="8" fill="#5EC4CC" opacity="0.3"/>
    </g>

    <!-- Bottom-right node -->
    <g transform="translate(104, 60)">
      <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" 
               fill="url(#base)" filter="url(#nodeShadow)"/>
      <polygon points="0,-24 20,-12 20,12 0,24 -20,12 -20,-12" 
               fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="8" fill="#2F7F8F" opacity="0.3"/>
    </g>

    <!-- Bottom node -->
    <g transform="translate(0, 120)">
      <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" 
               fill="url(#teal)" filter="url(#nodeShadow)"/>
      <polygon points="0,-24 20,-12 20,12 0,24 -20,12 -20,-12" 
               fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="8" fill="#5EC4CC" opacity="0.3"/>
    </g>

    <!-- Bottom-left node -->
    <g transform="translate(-104, 60)">
      <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" 
               fill="url(#base)" filter="url(#nodeShadow)"/>
      <polygon points="0,-24 20,-12 20,12 0,24 -20,12 -20,-12" 
               fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="8" fill="#2F7F8F" opacity="0.3"/>
    </g>

    <!-- Top-left node -->
    <g transform="translate(-104, -60)">
      <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" 
               fill="url(#teal)" filter="url(#nodeShadow)"/>
      <polygon points="0,-24 20,-12 20,12 0,24 -20,12 -20,-12" 
               fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="8" fill="#5EC4CC" opacity="0.3"/>
    </g>

    <!-- CONNECTION LINES around the outer ring (hex perimeter) -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" 
             fill="none" stroke="url(#teal)" stroke-width="3" opacity="0.25" 
             stroke-linejoin="round"/>

    <!-- FLOW LINES FROM CENTER TO OUTER NODES -->
    <!-- Top -->
    <line x1="0" y1="0" x2="0" y2="-120" stroke="url(#flow)" stroke-width="4" 
          stroke-linecap="round" opacity="0.9"/>
    <!-- Top-right -->
    <line x1="0" y1="0" x2="104" y2="-60" stroke="url(#flow)" stroke-width="4" 
          stroke-linecap="round" opacity="0.8"/>
    <!-- Bottom-right -->
    <line x1="0" y1="0" x2="104" y2="60" stroke="url(#flow)" stroke-width="4" 
          stroke-linecap="round" opacity="0.7"/>
    <!-- Bottom -->
    <line x1="0" y1="0" x2="0" y2="120" stroke="url(#flow)" stroke-width="4" 
          stroke-linecap="round" opacity="0.9"/>
    <!-- Bottom-left -->
    <line x1="0" y1="0" x2="-104" y2="60" stroke="url(#flow)" stroke-width="4" 
          stroke-linecap="round" opacity="0.8"/>
    <!-- Top-left -->
    <line x1="0" y1="0" x2="-104" y2="-60" stroke="url(#flow)" stroke-width="4" 
          stroke-linecap="round" opacity="0.7"/>

    <!-- CENTER HUB (App / UI layer) -->
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="52" fill="url(#hubGlow)" opacity="0.4" filter="url(#ambientGlow)"/>

    <!-- Main center hex -->
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" 
             fill="url(#teal)" filter="url(#nodeShadow)"/>

    <!-- Inner highlight hex -->
    <polygon points="0,-34 29,-17 29,17 0,34 -29,17 -29,-17" 
             fill="none" stroke="url(#flow)" stroke-width="3" opacity="0.8"/>

    <!-- Center core -->
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" 
             fill="url(#flow)" opacity="0.95"/>

    <!-- Innermost bright core -->
    <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" 
             fill="#F8FAFC" opacity="0.9"/>

    <!-- Flow pulse dots along each connection -->
    <circle cx="0" cy="-60" r="5" fill="#E4572E" opacity="0.9"/>
    <circle cx="52" cy="-30" r="5" fill="#F97066" opacity="0.8"/>
    <circle cx="52" cy="30" r="5" fill="#F97066" opacity="0.7"/>
    <circle cx="0" cy="60" r="5" fill="#E4572E" opacity="0.9"/>
    <circle cx="-52" cy="30" r="5" fill="#F97066" opacity="0.8"/>
    <circle cx="-52" cy="-30" r="5" fill="#F97066" opacity="0.7"/>

    <!-- Subtle orbit ring -->
    <circle cx="0" cy="0" r="145" fill="none" stroke="url(#teal)" stroke-width="1" 
            opacity="0.08" stroke-dasharray="8 12"/>
  </g>

  <!-- Outer containment circle -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#teal)" stroke-width="1.5" opacity="0.06"/>
</svg>