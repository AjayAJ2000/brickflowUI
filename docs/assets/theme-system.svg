<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">BrickflowUI theme system diagram</title>
  <desc id="desc">A detailed diagram showing how theme files, presets, light and dark modes, and loading assets are normalized into CSS variables and visual UI output.</desc>

  <defs>
    <linearGradient id="themeBg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
    <linearGradient id="themePanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <filter id="themeShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#91A6CF" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="980" rx="36" fill="url(#themeBg)"/>
  <text x="88" y="104" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">Theme System and Visual Presets</text>
  <text x="88" y="144" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="24">How branding, semantic tokens, presets, and light or dark overrides become a consistent interface across shell, cards, charts, and loading states.</text>

  <rect x="88" y="186" width="1424" height="726" rx="32" fill="#FFFFFF" fill-opacity="0.56" stroke="#D7E3F8"/>

  <rect x="126" y="236" width="298" height="250" rx="28" fill="url(#themePanel)" stroke="#D6E2F5" filter="url(#themeShadow)"/>
  <text x="164" y="292" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">1. Theme input</text>
  <text x="164" y="334" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">YAML or Python theme defines:</text>
  <text x="164" y="372" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• branding and logo paths</text>
  <text x="164" y="402" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• loading copy and media</text>
  <text x="164" y="432" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• light / dark overrides</text>
  <text x="164" y="462" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• optional preset name</text>

  <rect x="474" y="236" width="316" height="250" rx="28" fill="url(#themePanel)" stroke="#D6E2F5" filter="url(#themeShadow)"/>
  <text x="512" y="292" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">2. Normalization</text>
  <text x="512" y="334" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">Theme loader resolves aliases and merges:</text>
  <text x="512" y="372" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• `background` → `bg`</text>
  <text x="512" y="402" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• `light` / `dark` → mode sections</text>
  <text x="512" y="432" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• preset values applied first</text>
  <text x="512" y="462" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• explicit user tokens override presets</text>

  <rect x="840" y="236" width="316" height="250" rx="28" fill="url(#themePanel)" stroke="#D6E2F5" filter="url(#themeShadow)"/>
  <text x="878" y="292" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">3. Runtime tokens</text>
  <text x="878" y="334" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">Resolved config produces design tokens:</text>
  <text x="878" y="372" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• colors and surfaces</text>
  <text x="878" y="402" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• typography and spacing</text>
  <text x="878" y="432" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• radius, shadows, motion</text>
  <text x="878" y="462" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• loading config per mode</text>

  <rect x="1206" y="236" width="268" height="250" rx="28" fill="url(#themePanel)" stroke="#D6E2F5" filter="url(#themeShadow)"/>
  <text x="1244" y="292" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">4. UI output</text>
  <text x="1244" y="334" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">Shared styles power:</text>
  <text x="1244" y="372" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• shell and navigation</text>
  <text x="1244" y="402" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• cards and dashboards</text>
  <text x="1244" y="432" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• charts and tables</text>
  <text x="1244" y="462" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="19">• loading and status feedback</text>

  <path d="M424 360H474" stroke="#4361EE" stroke-width="10" stroke-linecap="round"/>
  <path d="M790 360H840" stroke="#4361EE" stroke-width="10" stroke-linecap="round"/>
  <path d="M1156 360H1206" stroke="#4361EE" stroke-width="10" stroke-linecap="round"/>

  <rect x="126" y="552" width="648" height="306" rx="28" fill="#0E172A"/>
  <text x="166" y="610" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Preset design languages</text>

  <rect x="166" y="650" width="130" height="148" rx="24" fill="#FFFFFF"/>
  <text x="194" y="688" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Modern</text>
  <text x="194" y="720" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">balanced</text>
  <text x="194" y="744" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">clean</text>
  <text x="194" y="768" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="17">default</text>

  <rect x="316" y="650" width="130" height="148" rx="24" fill="#EEF2FF"/>
  <text x="338" y="688" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Executive</text>
  <text x="338" y="720" fill="#41516B" font-family="Inter, Arial, sans-serif" font-size="17">formal</text>
  <text x="338" y="744" fill="#41516B" font-family="Inter, Arial, sans-serif" font-size="17">measured</text>
  <text x="338" y="768" fill="#41516B" font-family="Inter, Arial, sans-serif" font-size="17">board-ready</text>

  <rect x="466" y="650" width="130" height="148" rx="24" fill="#FAF5FF"/>
  <text x="502" y="688" fill="#6D28D9" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Bento</text>
  <text x="502" y="720" fill="#5B4B7D" font-family="Inter, Arial, sans-serif" font-size="17">soft cards</text>
  <text x="502" y="744" fill="#5B4B7D" font-family="Inter, Arial, sans-serif" font-size="17">editorial</text>
  <text x="502" y="768" fill="#5B4B7D" font-family="Inter, Arial, sans-serif" font-size="17">modular</text>

  <rect x="616" y="650" width="118" height="148" rx="24" fill="#07101F"/>
  <text x="632" y="688" fill="#67E8F9" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Cyberpunk</text>
  <text x="632" y="720" fill="#8BD3FF" font-family="Inter, Arial, sans-serif" font-size="17">high contrast</text>
  <text x="632" y="744" fill="#8BD3FF" font-family="Inter, Arial, sans-serif" font-size="17">neon</text>
  <text x="632" y="768" fill="#8BD3FF" font-family="Inter, Arial, sans-serif" font-size="17">ops-heavy</text>

  <rect x="806" y="552" width="668" height="306" rx="28" fill="#FFFFFF" stroke="#D6E2F5"/>
  <text x="846" y="610" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Mode-aware loading and branding</text>

  <rect x="846" y="656" width="278" height="156" rx="24" fill="#F8FAFC" stroke="#D7E3F8"/>
  <text x="880" y="698" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Light mode</text>
  <text x="880" y="732" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">logo or GIF can be bright and high-contrast</text>
  <text x="880" y="760" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">copy can stay business-friendly and crisp</text>

  <rect x="1160" y="656" width="278" height="156" rx="24" fill="#0F172A"/>
  <text x="1194" y="698" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Dark mode</text>
  <text x="1194" y="732" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">loading media can switch to dark assets</text>
  <text x="1194" y="760" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">to preserve contrast and brand fidelity</text>
</svg>
