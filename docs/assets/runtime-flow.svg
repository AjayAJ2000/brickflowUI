<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">BrickflowUI runtime lifecycle</title>
  <desc id="desc">A polished system diagram showing how Python pages, runtime state, websocket patches, and the React renderer interact during a BrickflowUI session.</desc>

  <defs>
    <linearGradient id="runtimeBg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020"/>
      <stop offset="1" stop-color="#111B31"/>
    </linearGradient>
    <linearGradient id="runtimePanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#12203B"/>
      <stop offset="1" stop-color="#0F1B32"/>
    </linearGradient>
    <filter id="runtimeShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020817" flood-opacity="0.44"/>
    </filter>
  </defs>

  <rect width="1600" height="920" rx="36" fill="url(#runtimeBg)"/>
  <text x="88" y="102" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">Runtime and Render Lifecycle</text>
  <text x="88" y="142" fill="#A3B4D7" font-family="Inter, Arial, sans-serif" font-size="24">The core BrickflowUI loop: Python builds a VNode tree, the runtime tracks state and auth, websocket messages carry patches, and the React renderer preserves interaction context.</text>

  <rect x="88" y="188" width="1424" height="650" rx="32" fill="#0E172A" stroke="#233E7A"/>

  <rect x="126" y="258" width="288" height="246" rx="28" fill="url(#runtimePanel)" stroke="#3559AA" filter="url(#runtimeShadow)"/>
  <text x="164" y="320" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">1. Python page</text>
  <text x="164" y="362" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="20">Page functions compose VNodes from</text>
  <text x="164" y="390" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="20">state, routes, data, and components.</text>
  <text x="164" y="434" fill="#DCE8FF" font-family="Inter, Arial, sans-serif" font-size="18">Examples:</text>
  <text x="164" y="462" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• layouts and cards</text>
  <text x="164" y="488" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• charts, tables, media</text>

  <rect x="468" y="236" width="322" height="290" rx="28" fill="url(#runtimePanel)" stroke="#3559AA" filter="url(#runtimeShadow)"/>
  <text x="506" y="298" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">2. Runtime core</text>
  <text x="506" y="340" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="20">The server normalizes the tree and manages:</text>
  <text x="506" y="380" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• session state and dirty rerenders</text>
  <text x="506" y="408" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• authentication and route access</text>
  <text x="506" y="436" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• local asset URLs and loading config</text>
  <text x="506" y="464" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• route handlers and event registry</text>

  <rect x="844" y="258" width="302" height="246" rx="28" fill="url(#runtimePanel)" stroke="#3559AA" filter="url(#runtimeShadow)"/>
  <text x="882" y="320" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">3. Websocket wire</text>
  <text x="882" y="362" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="20">Messages stream between backend and UI:</text>
  <text x="882" y="402" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• initial full tree</text>
  <text x="882" y="430" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• patch payloads</text>
  <text x="882" y="458" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• event dispatch and completion</text>

  <rect x="1200" y="236" width="274" height="290" rx="28" fill="url(#runtimePanel)" stroke="#3559AA" filter="url(#runtimeShadow)"/>
  <text x="1238" y="298" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">4. React renderer</text>
  <text x="1238" y="340" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="20">Frontend applies patches and keeps</text>
  <text x="1238" y="368" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="20">local interactions smooth.</text>
  <text x="1238" y="410" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• local-first inputs</text>
  <text x="1238" y="438" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• preserved focus and scroll</text>
  <text x="1238" y="466" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">• shell theming and motion</text>

  <path d="M414 382H468" stroke="#4F6BFF" stroke-width="12" stroke-linecap="round"/>
  <path d="M790 382H844" stroke="#4F6BFF" stroke-width="12" stroke-linecap="round"/>
  <path d="M1146 382H1200" stroke="#4F6BFF" stroke-width="12" stroke-linecap="round"/>

  <path d="M1200 578C1080 670 920 714 770 714C620 714 444 666 324 578" stroke="#6B87FF" stroke-width="10" stroke-linecap="round"/>
  <text x="562" y="770" fill="#DCE8FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">User events flow back to Python, mutate state, and trigger the next patch cycle.</text>
</svg>
