<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">BrickflowUI deployment topology</title>
  <desc id="desc">A deployment diagram showing browser traffic, edge routing, BrickflowUI app runtimes, shared state, data systems, and observability layers for enterprise deployment planning.</desc>

  <defs>
    <linearGradient id="deployBg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#091120"/>
      <stop offset="1" stop-color="#111D35"/>
    </linearGradient>
    <linearGradient id="deployPanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#142443"/>
      <stop offset="1" stop-color="#10203A"/>
    </linearGradient>
    <filter id="deployShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020817" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="980" rx="36" fill="url(#deployBg)"/>
  <text x="88" y="102" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">Deployment Topology</text>
  <text x="88" y="142" fill="#A3B4D7" font-family="Inter, Arial, sans-serif" font-size="24">A practical view of how BrickflowUI fits into enterprise hosting: client, edge, app runtime, shared state, external systems, and observability.</text>

  <rect x="88" y="188" width="1424" height="720" rx="32" fill="#0D172C" stroke="#233E7A"/>

  <rect x="132" y="332" width="220" height="168" rx="28" fill="url(#deployPanel)" stroke="#3559AA" filter="url(#deployShadow)"/>
  <text x="182" y="402" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Browser</text>
  <text x="166" y="438" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">Desktop, tablet, or mobile</text>
  <text x="166" y="464" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">talking to the shell and</text>
  <text x="166" y="490" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">websocket runtime.</text>

  <rect x="436" y="254" width="280" height="128" rx="24" fill="url(#deployPanel)" stroke="#3559AA" filter="url(#deployShadow)"/>
  <text x="486" y="326" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Ingress / Databricks App</text>
  <text x="486" y="356" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="17">TLS, routing, sticky session, platform edge</text>

  <rect x="436" y="444" width="280" height="194" rx="24" fill="url(#deployPanel)" stroke="#3559AA" filter="url(#deployShadow)"/>
  <text x="486" y="510" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">BrickflowUI Runtime</text>
  <text x="486" y="546" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">FastAPI + Uvicorn</text>
  <text x="486" y="574" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">page render, auth, routes</text>
  <text x="486" y="602" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">websocket events, local assets</text>

  <rect x="804" y="240" width="286" height="150" rx="24" fill="url(#deployPanel)" stroke="#3559AA" filter="url(#deployShadow)"/>
  <text x="850" y="304" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Shared session state</text>
  <text x="850" y="338" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">Redis or equivalent when moving</text>
  <text x="850" y="364" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">beyond single-instance deployments.</text>

  <rect x="804" y="458" width="286" height="180" rx="24" fill="url(#deployPanel)" stroke="#3559AA" filter="url(#deployShadow)"/>
  <text x="850" y="522" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Warehouse and APIs</text>
  <text x="850" y="556" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">Databricks SQL, Unity Catalog,</text>
  <text x="850" y="582" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">model endpoints, internal services.</text>

  <rect x="1178" y="332" width="290" height="168" rx="28" fill="url(#deployPanel)" stroke="#3559AA" filter="url(#deployShadow)"/>
  <text x="1232" y="402" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Logs and Metrics</text>
  <text x="1214" y="438" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">Request tracing, event audit,</text>
  <text x="1214" y="464" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">health, latency, and error analysis.</text>

  <path d="M352 416H436" stroke="#4F6BFF" stroke-width="12" stroke-linecap="round"/>
  <path d="M716 316H804" stroke="#4F6BFF" stroke-width="12" stroke-linecap="round"/>
  <path d="M716 542H804" stroke="#4F6BFF" stroke-width="12" stroke-linecap="round"/>
  <path d="M1090 416H1178" stroke="#4F6BFF" stroke-width="12" stroke-linecap="round"/>

  <text x="758" y="312" fill="#8FB0FF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">state sync</text>
  <text x="760" y="538" fill="#8FB0FF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">queries / calls</text>

  <rect x="132" y="710" width="1336" height="140" rx="26" fill="#122140" stroke="#2C4A90"/>
  <text x="172" y="764" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Recommended rollout path</text>
  <text x="172" y="804" fill="#B9C7E5" font-family="Inter, Arial, sans-serif" font-size="20">Start with a single runtime or sticky-session deployment. Add shared state only when you need multi-instance coordination, then layer centralized metrics, audit logging, and policy enforcement as traffic and team count grow.</text>
</svg>
