<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 512" width="980" height="240">
  <defs>
    <!-- Base palette -->
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="35%" stop-color="#1E293B"/>
      <stop offset="70%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2F7F8F"/>
      <stop offset="100%" stop-color="#5EC4CC"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E4572E"/>
      <stop offset="100%" stop-color="#F97066"/>
    </linearGradient>
    <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1F2937" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2F7F8F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2F7F8F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- LEFT SIDE: node-graph logo (scaled to 384×384, centered at 192,256) -->
  <g transform="translate(192,256)">

    <!-- Background halo -->
    <circle cx="0" cy="0" r="180" fill="url(#base)" opacity="0.08" filter="url(#ambientGlow)"/>
    <circle cx="0" cy="0" r="165" fill="none" stroke="url(#teal)" stroke-width="1" opacity="0.1"/>

    <!-- OUTER RING OF NODES (6 hex nodes, radius 90) -->
    <g transform="translate(0, -90)">
      <polygon points="0,-21 18,-10.5 18,10.5 0,21 -18,10.5 -18,-10.5"
                fill="url(#base)" filter="url(#nodeShadow)"/>
      <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9"
                fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="6" fill="#2F7F8F" opacity="0.3"/>
    </g>
    <g transform="translate(78, -45)">
      <polygon points="0,-21 18,-10.5 18,10.5 0,21 -18,10.5 -18,-10.5"
                fill="url(#teal)" filter="url(#nodeShadow)"/>
      <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9"
                fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="6" fill="#5EC4CC" opacity="0.3"/>
    </g>
    <g transform="translate(78, 45)">
      <polygon points="0,-21 18,-10.5 18,10.5 0,21 -18,10.5 -18,-10.5"
                fill="url(#base)" filter="url(#nodeShadow)"/>
      <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9"
                fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="6" fill="#2F7F8F" opacity="0.3"/>
    </g>
    <g transform="translate(0, 90)">
      <polygon points="0,-21 18,-10.5 18,10.5 0,21 -18,10.5 -18,-10.5"
                fill="url(#teal)" filter="url(#nodeShadow)"/>
      <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9"
                fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="6" fill="#5EC4CC" opacity="0.3"/>
    </g>
    <g transform="translate(-78, 45)">
      <polygon points="0,-21 18,-10.5 18,10.5 0,21 -18,10.5 -18,-10.5"
                fill="url(#base)" filter="url(#nodeShadow)"/>
      <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9"
                fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="6" fill="#2F7F8F" opacity="0.3"/>
    </g>
    <g transform="translate(-78, -45)">
      <polygon points="0,-21 18,-10.5 18,10.5 0,21 -18,10.5 -18,-10.5"
                fill="url(#teal)" filter="url(#nodeShadow)"/>
      <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9"
                fill="none" stroke="url(#teal)" stroke-width="2" opacity="0.6"/>
      <circle cx="0" cy="0" r="6" fill="#5EC4CC" opacity="0.3"/>
    </g>

    <!-- Hex perimeter line -->
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45"
              fill="none" stroke="url(#teal)" stroke-width="3" opacity="0.25"
              stroke-linejoin="round"/>

    <!-- Flow lines to outer nodes -->
    <g>
      <line x1="0" y1="0" x2="0" y2="-90" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
      <line x1="0" y1="0" x2="78" y2="-45" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
      <line x1="0" y1="0" x2="78" y2="45" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
      <line x1="0" y1="0" x2="0" y2="90" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
      <line x1="0" y1="0" x2="-78" y2="45" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
      <line x1="0" y1="0" x2="-78" y2="-45" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- Center hub -->
    <circle cx="0" cy="0" r="39" fill="url(#hubGlow)" opacity="0.4" filter="url(#ambientGlow)"/>
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
              fill="url(#teal)" filter="url(#nodeShadow)"/>
    <polygon points="0,-25.5 22,-12.75 22,12.75 0,25.5 -22,12.75 -22,-12.75"
              fill="none" stroke="url(#flow)" stroke-width="3" opacity="0.8"/>
    <polygon points="0,-16.5 14,-8.25 14,8.25 0,16.5 -14,8.25 -14,-8.25"
              fill="url(#flow)" opacity="0.95"/>
    <polygon points="0,-9 7.5,-4.5 7.5,4.5 0,9 -7.5,-4.5 -7.5,4.5"
              fill="#F8FAFC" opacity="0.9"/>

    <!-- Flow pulse dots -->
    <circle cx="0" cy="-45" r="4" fill="#E4572E" opacity="0.9"/>
    <circle cx="39" cy="-22.5" r="4" fill="#F97066" opacity="0.8"/>
    <circle cx="39" cy="22.5" r="4" fill="#F97066" opacity="0.7"/>
    <circle cx="0" cy="45" r="4" fill="#E4572E" opacity="0.9"/>
    <circle cx="-39" cy="22.5" r="4" fill="#F97066" opacity="0.8"/>
    <circle cx="-39" cy="-22.5" r="4" fill="#F97066" opacity="0.7"/>

    <!-- Subtle orbit ring -->
    <circle cx="0" cy="0" r="109" fill="none" stroke="url(#teal)" stroke-width="1"
            opacity="0.08" stroke-dasharray="8 12"/>
  </g>

  <!-- RIGHT SIDE: scaled, aligned "brickflowUI" wordmark -->
    <!-- Wordmark using native text tags for guaranteed rendering -->
  <text x="380" y="270" font-family="Arial, sans-serif" font-weight="bold" font-size="80" fill="#111827">
    brickflow<tspan fill="#F97066">UI</tspan>
</svg>