<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">BrickflowUI authentication and authorization flow</title>
  <desc id="desc">A detailed enterprise diagram showing how requests and websocket sessions move through auth resolution, guard evaluation, policy checks, and final runtime outcomes.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#4F6BFF"/>
      <stop offset="1" stop-color="#3151F0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#8AA0C8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="920" rx="36" fill="url(#bg)"/>

  <text x="88" y="106" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">Authentication and Guard Flow</text>
  <text x="88" y="146" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="24">How BrickflowUI resolves identity, evaluates access policies, and decides whether a page, route, or websocket event can proceed.</text>

  <rect x="88" y="186" width="1424" height="658" rx="32" fill="#FFFFFF" fill-opacity="0.56" stroke="#D7E3F8"/>

  <rect x="120" y="238" width="286" height="210" rx="26" fill="url(#panel)" stroke="#D6E2F5" filter="url(#shadow)"/>
  <circle cx="166" cy="282" r="24" fill="#E7EDFF"/>
  <text x="157" y="290" fill="#3151F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">1</text>
  <text x="204" y="288" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Entry Point</text>
  <text x="152" y="334" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">HTTP request, websocket handshake,</text>
  <text x="152" y="364" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">form submission, or component event.</text>
  <text x="152" y="412" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">Context established:</text>
  <text x="152" y="438" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">• path, method, headers, cookies</text>

  <rect x="458" y="238" width="304" height="210" rx="26" fill="url(#panel)" stroke="#D6E2F5" filter="url(#shadow)"/>
  <circle cx="504" cy="282" r="24" fill="#E7EDFF"/>
  <text x="495" y="290" fill="#3151F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">2</text>
  <text x="542" y="288" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Auth Provider</text>
  <text x="490" y="334" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">Resolve a principal from request headers,</text>
  <text x="490" y="364" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">session state, cookies, or enterprise SSO.</text>
  <text x="490" y="412" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">Outputs:</text>
  <text x="490" y="438" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">• app principal • user principal • anonymous</text>

  <rect x="814" y="238" width="304" height="210" rx="26" fill="url(#panel)" stroke="#D6E2F5" filter="url(#shadow)"/>
  <circle cx="860" cy="282" r="24" fill="#E7EDFF"/>
  <text x="851" y="290" fill="#3151F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">3</text>
  <text x="898" y="288" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Policy Check</text>
  <text x="846" y="334" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">Evaluate access level and required roles</text>
  <text x="846" y="364" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">for the current page, route, or action.</text>
  <text x="846" y="412" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">Checks:</text>
  <text x="846" y="438" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">• public • authenticated • user • app • roles</text>

  <rect x="1170" y="238" width="310" height="210" rx="26" fill="url(#panel)" stroke="#D6E2F5" filter="url(#shadow)"/>
  <circle cx="1216" cy="282" r="24" fill="#E7EDFF"/>
  <text x="1207" y="290" fill="#3151F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">4</text>
  <text x="1254" y="288" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Outcome</text>
  <text x="1202" y="334" fill="#15803D" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Authorized</text>
  <text x="1326" y="334" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">render page, register session,</text>
  <text x="1326" y="364" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">or execute backend handler</text>
  <text x="1202" y="414" fill="#BE123C" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Denied</text>
  <text x="1284" y="414" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21">return sign-in or access-denied UI</text>

  <path d="M406 343H458" stroke="url(#blueLine)" stroke-width="10" stroke-linecap="round"/>
  <path d="M762 343H814" stroke="url(#blueLine)" stroke-width="10" stroke-linecap="round"/>
  <path d="M1118 343H1170" stroke="url(#blueLine)" stroke-width="10" stroke-linecap="round"/>

  <rect x="120" y="520" width="1360" height="274" rx="28" fill="#0E172A"/>
  <text x="156" y="576" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Enterprise checkpoints</text>

  <rect x="156" y="618" width="296" height="132" rx="22" fill="#13213A" stroke="#29498E"/>
  <text x="188" y="660" fill="#DCE8FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Identity source</text>
  <text x="188" y="694" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">Use HeaderAuthProvider locally, then swap</text>
  <text x="188" y="720" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">to enterprise SSO or platform session auth.</text>

  <rect x="482" y="618" width="296" height="132" rx="22" fill="#13213A" stroke="#29498E"/>
  <text x="514" y="660" fill="#DCE8FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Navigation filtering</text>
  <text x="514" y="694" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">Unauthorized pages are hidden from shell nav,</text>
  <text x="514" y="720" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">not just blocked after a click.</text>

  <rect x="808" y="618" width="296" height="132" rx="22" fill="#13213A" stroke="#29498E"/>
  <text x="840" y="660" fill="#DCE8FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Audit and policy hooks</text>
  <text x="840" y="694" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">Enable event auditing and enforce role policy</text>
  <text x="840" y="720" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">at route, page, and handler boundaries.</text>

  <rect x="1134" y="618" width="310" height="132" rx="22" fill="#13213A" stroke="#29498E"/>
  <text x="1166" y="660" fill="#DCE8FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">User experience</text>
  <text x="1166" y="694" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">Failures stay explicit: sign-in required, role</text>
  <text x="1166" y="720" fill="#9FB2D6" font-family="Inter, Arial, sans-serif" font-size="18">missing, or anonymous access not allowed.</text>
</svg>
