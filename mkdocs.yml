site_name: BrickflowUI
site_description: Databricks-first Python UI framework for dashboards, portals, and internal web apps.
site_url: https://ajayaj2000.github.io/brickflowUI/
repo_url: https://github.com/AjayAJ2000/brickflowUI
repo_name: AjayAJ2000/brickflowUI

theme:
  name: material
  logo: assets/favicon-light.svg
  favicon: assets/favicon.svg
  features:
    - navigation.expand
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

extra:
  generator: false

extra_css:
  - stylesheets/brand.css

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details
  - tables

