site_name: BrickflowUI
site_description: Databricks-first Python UI framework for dashboards, portals, and internal web apps.
site_url: https://ajayaj2000.github.io/brickflowUI/
repo_url: https://github.com/AjayAJ2000/brickflowUI
repo_name: AjayAJ2000/brickflowUI

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: red
      accent: red

extra:
  generator: false

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details
  - tables

nav:
  - Home: index.md
  - Learn BrickflowUI:
      - Overview: learning/index.md
      - What Is BrickflowUI: learning/01-what-is-brickflowui.md
      - Install And Run: learning/02-install-and-run.md
      - Your First App: learning/03-your-first-app.md
      - Mental Model: learning/04-mental-model.md
      - Layout Skills: learning/05-layout-skills.md
      - Components And Composition: learning/06-components-and-composition.md
      - State And Events: learning/07-state-and-events.md
      - Inputs And User Actions: learning/08-inputs-and-user-actions.md
      - Forms And API Routes: learning/09-forms-and-api-routes.md
      - Tables And Data Display: learning/10-tables-and-data-display.md
      - Charts And Visualizations: learning/11-charts-and-visualizations.md
      - Pipeline Dashboards: learning/12-pipeline-dashboards.md
      - Chatbot And Assistant UI: learning/13-chatbot-and-assistant-ui.md
      - Theming And Branding: learning/14-theming-and-branding.md
      - Navigation And App Structure: learning/15-navigation-and-app-structure.md
      - Databricks Apps Deployment: learning/16-databricks-apps-deployment.md
      - Debugging And Reliability: learning/17-debugging-and-reliability.md
      - Production Checklist: learning/18-production-checklist.md
      - Capstone Project: learning/19-capstone-project.md
      - Glossary: learning/glossary.md
  - Quick Start: GETTING_STARTED.md
  - First App Tutorial: TUTORIAL.md
  - Examples: EXAMPLES.md
  - Databricks Apps: DATABRICKS_APPS.md
  - Troubleshooting: TROUBLESHOOTING.md
  - FAQ: FAQ.md
  - How It Works: HOW_IT_WORKS.md
  - Polish Guide: POLISH_GUIDE.md
  - Visualizations And Pipelines: VISUALIZATIONS.md
  - Recipes: RECIPES.md
  - API Reference: API_REFERENCE.md
  - Theming: THEMING.md
  - Build Guide: BUILD.md
  - Publishing: PUBLISHING.md
