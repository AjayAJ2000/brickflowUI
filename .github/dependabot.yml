version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 4
    groups:
      python-runtime:
        patterns:
          - "fastapi"
          - "starlette"
          - "uvicorn*"
          - "websockets"
          - "python-dotenv"
          - "PyYAML"
      python-dev:
        patterns:
          - "pytest*"
          - "httpx"
          - "ruff"
          - "mypy"
          - "mkdocs*"
          - "build"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      frontend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
