name: Security

on:
  push:
    branches: [dev, test, main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    branches: [dev, test, main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python audit tooling
        run: python -m pip install pip-audit

      - name: Install development dependency surface
        run: python -m pip install -e ".[dev]"

      - name: Install optional runtime dependency surface
        run: python -m pip install -e ".[databricks,viz]"

      - name: Audit Python dependencies
        run: python -m pip_audit

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit production frontend dependencies
        working-directory: frontend
        run: npm audit --omit=dev
