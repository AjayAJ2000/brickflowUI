name: Publish to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  tests:
    name: Run release gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs,viz]"
          python -m pip install build twine

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests, lint, type check, and dependency audit
        working-directory: frontend
        run: |
          npm test -- --run
          npm run lint
          npm run typecheck
          npm audit --audit-level=high

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check committed frontend bundle
        run: git diff --exit-code -- brickflowui/frontend/dist

      - name: Run test suite
        run: python -m pytest -q

      - name: Run Python lint
        run: python -m ruff check brickflowui tests examples

      - name: Run Python type checks
        run: python -m mypy brickflowui

      - name: Regenerate component reference pages
        run: python scripts/generate_component_reference.py

      - name: Check component reference drift
        run: git diff --exit-code -- docs/components/reference

      - name: Build documentation
        run: python -m mkdocs build --strict

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

  publish:
    name: Publish package distributions to PyPI
    runs-on: ubuntu-latest
    needs: tests
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
