name: CI

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev,viz]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run Python lint
        run: python -m ruff check brickflowui tests examples

      - name: Run Python type checks
        run: python -m mypy brickflowui

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev,docs,databricks,viz]"

      - name: Install package build tooling
        run: python -m pip install build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Run frontend type check
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

      - name: Check committed frontend bundle drift
        run: git diff --exit-code -- brickflowui/frontend/dist

      - name: Smoke maintained examples
        run: python scripts/smoke_examples.py

      - name: Regenerate component reference pages
        run: python scripts/generate_component_reference.py

      - name: Check component reference drift
        run: git diff --exit-code -- docs/components/reference

      - name: Build docs
        run: python -m mkdocs build --strict

      - name: Build package
        run: python -m build
